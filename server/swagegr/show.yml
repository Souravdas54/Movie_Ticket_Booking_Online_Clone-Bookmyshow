openapi: 3.0.0
info:
  title: Show API
  version: 1.0.0
  description: API for managing movie shows, times, and seat locks

servers:
  - url: http://localhost:8500

tags:
  - name: Show
    description: Manage movie shows

paths:

  /shows/create:
    post:
      tags: [Show]
      summary: Create a new show
      description: Admin only
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowCreate'
      responses:
        201:
          description: Show created successfully
        400:
          description: Bad request
        401:
          description: Unauthorized
        500:
          description: Internal Server Error

  /shows/movie/{movieId}:
    get:
      tags: [Show]
      summary: Get shows by movie ID with optional date filter
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: false
          schema: { type: string, example: "2025-11-29" }
      responses:
        200:
          description: Shows fetched successfully
        404:
          description: No shows found

  /shows/{id}:
    get:
      tags: [Show]
      summary: Get a show by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Show found
        404:
          description: Show not found

  /shows/{movieId}/times:
    get:
      tags: [Show]
      summary: Get available show times for a movie on a specific date
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: movieId
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: true
          schema: { type: string, example: "2025-11-29" }
      responses:
        200:
          description: Available times returned
        400:
          description: Date is required
        404:
          description: No times found

  /shows/theater/{theaterId}/movie/{movieId}:
    get:
      tags: [Show]
      summary: Get show by theater, movie, date, and time
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: theaterId
          required: true
          schema: { type: string }
        - in: path
          name: movieId
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: true
          schema: { type: string, example: "2025-11-29" }
        - in: query
          name: time
          required: true
          schema: { type: string, example: "12:00 PM" }
      responses:
        200:
          description: Show found successfully
        400:
          description: Date and time are required
        404:
          description: Show not found

  /shows/show/{id}:
    put:
      tags: [Show]
      summary: Update a show (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowUpdate'
      responses:
        200:
          description: Show updated successfully
        404:
          description: Show not found
        500:
          description: Internal Server Error

    delete:
      tags: [Show]
      summary: Delete a show (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Show deleted successfully
        404:
          description: Show not found

  /shows/release-expired-locks:
    delete:
      tags: [Show]
      summary: Remove expired seat locks (Admin only)
      security:
        - bearerAuth: []
      responses:
        200:
          description: Expired locks released successfully
        500:
          description: Failed to release locks

  /shows/debug/all:
    get:
      tags: [Show]
      summary: Debug route to get all shows
      responses:
        200:
          description: All shows returned

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    LockSchema:
      type: object
      properties:
        seat: { type: string }
        sessionId: { type: string }
        expiresAt: { type: string }

    SeatCategory:
      type: object
      properties:
        category:
          type: string
          enum: [Golden, Platinum, Diamond, Royal]
        price:
          type: number

    TimeSlot:
      type: object
      properties:
        time: { type: string, example: "12:00 PM" }
        availableCategories:
          type: array
          items:
            $ref: '#/components/schemas/SeatCategory'

    Room:
      type: object
      properties:
        name: { type: string }
        rows: { type: number }
        columns: { type: number }

    ShowCreate:
      type: object
      required: [movieId, theaterId, room, screenNumber, date, timeSlots]
      properties:
        movieId: { type: string }
        theaterId: { type: string }
        room:
          $ref: '#/components/schemas/Room'
        screenNumber: { type: string }
        date:
          type: string
          format: date
        timeSlots:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'

    ShowUpdate:
      type: object
      properties:
        room:
          $ref: '#/components/schemas/Room'
        screenNumber: { type: string }
        date: { type: string, format: date }
        timeSlots:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
