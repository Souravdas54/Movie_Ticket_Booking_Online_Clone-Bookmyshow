openapi: 3.0.0
info:
  title: Movie Booking API
  version: 1.0.0
  description: A complete movie booking system API

servers:
  - url: http://localhost:8500
    description: Local server

paths:
  # USERS API --------------------------
  # Signup #
  /auth/signup:
    post:
      tags: [Users]
      summary: User Registration
      description: Register a new user with profile picture upload.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                phone:
                  type: string
                  example: "+8801712345678"
                gender:
                  type: string
                  example: male
                password:
                  type: string
                  example: "password123"
                role:
                  type: string
                  enum: [user, admin]
                  example: user
                profilePicture:
                  type: string
                  format: binary
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "400":
          description: Validation error or email exists
        "500":
          description: Internal Server Error
  
  # LOGIN #
  /auth/signin:
    post:
      tags: [Users]
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: "password123"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "400":
          description: Validation error
        "404":
          description: User not found
        "401":
          description: Invalid password

  # Refresh token
  /auth/refresh-token:
    post:
      tags: [Users]
      summary: Refresh Access Token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: "your-refresh-token-here"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        "401":
          description: Invalid refresh token

  # Get all users
  /auth/profile:
    get:
      tags: [Users]
      summary: Get all user profiles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users fetched successfully
        "401":
          description: Unauthorized
        "404":
          description: No users found

  # Get user by ID
  /auth/profile/user/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: "65f8a7b9c1d2e3f4a5b6c7d8"
      responses:
        "200":
          description: User fetched successfully
        "401":
          description: Unauthorized
        "404":
          description: User not found

  # Update profile
  /auth/profile/update/{id}:
    put:
      tags: [Users]
      summary: Update user profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: "65f8a7b9c1d2e3f4a5b6c7d8"
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Smith
                phone:
                  type: string
                  example: "+8801712345679"
                profilePicture:
                  type: string
                  format: binary
      responses:
        "200":
          description: Profile updated successfully
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "500":
          description: Internal Server Error

  # Logout
  /auth/logout:
    post:
      tags: [Users]
      summary: User Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT token in the format "Bearer <token>"

  schemas:
    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "User registered successfully"
        data:
          type: object
          properties:
            _id:
              type: string
              example: "65f8a7b9c1d2e3f4a5b6c7d8"
            name:
              type: string
              example: "John Doe"
            email:
              type: string
              example: "john@example.com"
            phone:
              type: string
              example: "+8801712345678"
            gender:
              type: string
              example: "male"
            profilePicture:
              type: string
              example: "https://example.com/profile.jpg"
            isVerified:
              type: boolean
              example: false
            role:
              type: string
              example: "user"
            createdAt:
              type: string
              example: "2024-03-19T10:30:00.000Z"
            updatedAt:
              type: string
              example: "2024-03-19T10:30:00.000Z"

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Login successful"
        data:
          type: object
          properties:
            _id:
              type: string
              example: "65f8a7b9c1d2e3f4a5b6c7d8"
            name:
              type: string
              example: "John Doe"
            email:
              type: string
              example: "john@example.com"
            phone:
              type: string
              example: "+8801712345678"
            profilePicture:
              type: string
              example: "https://example.com/profile.jpg"
            isVerified:
              type: boolean
              example: true
            role:
              type: string
              example: "user"
        tokens:
          type: object
          properties:
            accessToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            refreshToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            accessTokenExpires:
              type: string
              example: "2024-03-19T11:30:00.000Z"
            refreshTokenExpires:
              type: string
              example: "2024-04-19T10:30:00.000Z"

    RefreshResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Token refreshed successfully"
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            refreshToken:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            accessTokenExpires:
              type: string
              example: "2024-03-19T11:30:00.000Z"
            refreshTokenExpires:
              type: string
              example: "2024-04-19T10:30:00.000Z"