openapi: 3.0.0
info:
  title: Booking API
  version: 1.0.0
  description: Movie ticket booking, seat locking, confirming, releasing API

servers:
  - url: http://localhost:8500

tags:
  - name: Booking
    description: Booking & seat lock management

paths:

  /booking/lock:
    post:
      tags: [Booking]
      summary: Lock seats temporarily
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LockSeatRequest'
      responses:
        200:
          description: Seats locked
        400:
          description: Missing fields
        401:
          description: Unauthorized
        500:
          description: Server error

  /booking/confirm:
    post:
      tags: [Booking]
      summary: Confirm booking (locks → booking)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmBookingRequest'
      responses:
        201:
          description: Booking confirmed
        400:
          description: Missing fields
        401:
          description: Unauthorized
        409:
          description: Conflict (already booked / not locked)
        500:
          description: Server error

  /booking/my-booking:
    get:
      tags: [Booking]
      summary: Get logged-in user's bookings
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, example: 20 }
        - in: query
          name: skip
          schema: { type: integer, example: 0 }
      responses:
        200:
          description: Booking list
        401:
          description: Unauthorized

  /booking/release:
    post:
      tags: [Booking]
      summary: Release locked seats manually
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseSeatRequest'
      responses:
        200:
          description: Seats released successfully
        400:
          description: Missing required fields
        401:
          description: Unauthorized
        500:
          description: Server error

  /booking/{id}:
    get:
      tags: [Booking]
      summary: Get booking by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Booking found
        404:
          description: Booking not found

    put:
      tags: [Booking]
      summary: Update booking (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingUpdate'
      responses:
        200:
          description: Booking updated

    delete:
      tags: [Booking]
      summary: Delete booking (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Booking deleted
        404:
          description: Not found

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # -------- REQUEST SCHEMAS -------- #

    LockSeatRequest:
      type: object
      required: [showId, seats, sessionId]
      properties:
        showId: { type: string, example: "676eee44cf9a9980a93036c1" }
        seats:
          type: array
          items: { type: string }
          example: ["A1", "A2"]
        sessionId:
          type: string
          example: "session_123abc"
        ttlSeconds:
          type: number
          example: 300

    ConfirmBookingRequest:
      type: object
      required: [showId, seats, sessionId, totalAmount]
      properties:
        showId: { type: string }
        seats:
          type: array
          items: { type: string }
          example: ["A1", "A2"]
        sessionId:
          type: string
        totalAmount:
          type: number
          example: 400

    ReleaseSeatRequest:
      type: object
      required: [showId, seats, sessionId]
      properties:
        showId: { type: string }
        seats:
          type: array
          items: { type: string }
          example: ["B3", "B4"]
        sessionId:
          type: string

    BookingUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [Confirmed, Cancelled, Pending]
        paymentStatus:
          type: string
          enum: [Paid, Unpaid]

    # -------- RESPONSE SCHEMAS -------- #

    Booking:
      type: object
      properties:
        _id: { type: string }
        userId: { type: string }
        movieId: { type: string }
        theaterId: { type: string }
        showId: { type: string }
        seats:
          type: array
          items: { type: string }
        totalAmount: { type: number }
        status:
          type: string
          enum: [Confirmed, Cancelled, Pending]
        paymentStatus:
          type: string
          enum: [Paid, Unpaid]
        bookedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
